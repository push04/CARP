<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CARP Tender Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
        
        :root {
            --primary: #111827;
            --primary-light: #374151;
            --primary-dark: #000000;
            --success: #111827;
            --warning: #4b5563;
            --danger: #dc2626;
            --bg-primary: #ffffff;
            --bg-secondary: #f3f4f6;
            --border: #e5e7eb;
            --text-primary: #111827;
            --text-muted: #6b7280;
        }
        
        body {
            background: var(--bg-secondary);
            color: var(--text-primary);
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        
        .navbar { background: var(--primary) !important; }
        .navbar-brand { font-weight: 700; }
        
        .stat-card {
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 1.25rem;
            transition: all 0.2s;
        }
        .stat-card:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(0,0,0,0.08); }
        .stat-card.total { border-left: 4px solid var(--primary); }
        .stat-card.open { border-left: 4px solid var(--success); }
        .stat-card.bihar { border-left: 4px solid var(--warning); }
        .stat-card.jharkhand { border-left: 4px solid #0891b2; }
        
        .stat-number { font-family: 'JetBrains Mono', monospace; font-size: 2rem; font-weight: 700; }
        .stat-label { font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-top: 0.5rem; font-weight: 600; }
        
        .btn {
            font-weight: 600;
            border-radius: 8px;
            padding: 0.5rem 1rem;
            border: 1px solid transparent;
            transition: all 0.2s;
        }
        
        .btn-primary { background: var(--primary); color: white; border-color: var(--primary); }
        .btn-primary:hover { background: var(--primary-dark); color: white; }
        .btn-success { background: white; color: var(--primary); border-color: var(--border); }
        .btn-success:hover { background: var(--bg-secondary); color: var(--primary); border-color: var(--primary-light); }
        .btn-danger { background: white; color: var(--danger); border-color: var(--border); }
        .btn-danger:hover { background: #fee2e2; border-color: var(--danger); }
        .btn-warning { background: var(--warning); color: white; border-color: var(--warning); }
        .btn-warning:hover { background: #1f2937; color: white;}
        
        .btn-ai { background: var(--primary); color: white; border: 1px solid var(--primary-light); }
        .btn-ai:hover { background: var(--primary-dark); color: white; border: 1px solid var(--border); }
        
        .stat-icon {
            width: 48px; height: 48px; border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.25rem;
        }
        .stat-card.total .stat-icon { background: var(--bg-secondary); color: var(--primary); }
        .stat-card.open .stat-icon { background: var(--bg-secondary); color: var(--primary); }
        .stat-card.bihar .stat-icon { background: var(--bg-secondary); color: var(--primary); }
        .stat-card.jharkhand .stat-icon { background: var(--bg-secondary); color: var(--primary); }
        
        .card {
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
        }
        
        .card-header {
            background: var(--bg-primary);
            border-bottom: 1px solid var(--border);
            padding: 1rem 1.25rem;
            font-weight: 600;
        }
        
        .btn {
            font-weight: 600;
            border-radius: 10px;
            padding: 0.5rem 1rem;
        }
        
        .btn-primary { background: var(--primary); border: none; }
        .btn-primary:hover { background: var(--primary-dark); }
        .btn-success { background: var(--success); }
        .btn-danger { background: var(--danger); }
        .btn-warning { background: var(--warning); color: white; }
        
        .btn-ai { background: linear-gradient(135deg, #7c3aed, #a855f7); color: white; }
        
        .filter-panel {
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.25rem;
            box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
        }
        
        .form-label {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 0.35rem;
            font-weight: 600;
        }
        
        .form-select, .form-control {
            background: var(--bg-secondary);
            border: 1.5px solid var(--border);
            border-radius: 10px;
            padding: 0.6rem 0.9rem;
        }
        
        .form-select:focus, .form-control:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(17, 24, 39, 0.1);
        }
        
        .table { font-size: 0.85rem; }
        .table thead { background: var(--bg-secondary); }
        .table th {
            font-weight: 600;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-muted);
        }
        .table td { padding: 0.875rem 1rem; border-color: var(--border); }
        .table tbody tr:hover { background: var(--bg-secondary); }
        
        .badge {
            padding: 0.35rem 0.65rem;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.7rem;
        }
        
        .title-cell a { color: var(--primary); text-decoration: none; font-weight: 500; }
        .title-cell a:hover { text-decoration: underline; }
        
        .action-btns .btn {
            width: 30px; height: 30px;
            padding: 0;
            font-size: 0.8rem;
        }
        
        .ai-panel {
            background: var(--primary);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.25rem;
            color: white;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }
        
        .ai-panel .btn {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            border-radius: 8px;
        }
        
        .ai-panel .btn:hover { background: rgba(255,255,255,0.1); border-color: white;}
        
        .results-info { font-size: 0.8rem; color: var(--text-muted); }
        
        .empty-state { text-align: center; padding: 3rem; color: var(--text-muted); }
        
        .checkbox-cell input { accent-color: var(--primary); }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="/"><i class="fas fa-layer-group me-2"></i>CARP <span>Tenders</span></a>
        </div>
    </nav>

    <div class="container-fluid py-4">
        <!-- Stats -->
        <div class="row g-3 mb-4">
            <div class="col-6 col-lg-3">
                <div class="stat-card total">
                    <div class="d-flex justify-content-between">
                        <div><div class="stat-number" id="totalTendersCount">{{ total_tenders }}</div><div class="stat-label">Total Tenders</div></div>
                        <div class="stat-icon"><i class="fas fa-file-contract"></i></div>
                    </div>
                </div>
            </div>
            <div class="col-6 col-lg-3">
                <div class="stat-card open">
                    <div class="d-flex justify-content-between">
                        <div><div class="stat-number" id="openTendersCount">{{ open_tenders }}</div><div class="stat-label">Open Tenders</div></div>
                        <div class="stat-icon"><i class="fas fa-lock-open"></i></div>
                    </div>
                </div>
            </div>
            <div class="col-6 col-lg-3">
                <div class="stat-card bihar">
                    <div class="d-flex justify-content-between">
                        <div><div class="stat-number" id="biharTendersCount">{{ bihar_tenders }}</div><div class="stat-label">Bihar</div></div>
                        <div class="stat-icon"><i class="fas fa-map-marker-alt"></i></div>
                    </div>
                </div>
            </div>
            <div class="col-6 col-lg-3">
                <div class="stat-card jharkhand">
                    <div class="d-flex justify-content-between">
                        <div><div class="stat-number" id="jharkhandTendersCount">{{ jharkhand_tenders }}</div><div class="stat-label">Jharkhand</div></div>
                        <div class="stat-icon"><i class="fas fa-mountain"></i></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- AI Panel -->
        <div class="row mb-4">
            <div class="col-12">
                <div class="ai-panel">
                    <div class="row align-items-center">
                        <div class="col-lg-4"><h5 class="mb-1 text-white"><i class="fas fa-brain me-2"></i>AI Assistant</h5><small class="text-white-50">Smart tender analysis</small></div>
                        <div class="col-lg-8">
                            <div class="d-flex gap-2 flex-wrap justify-content-lg-end">
                                <button class="btn" onclick="checkAIHealth()"><i class="fas fa-heartbeat me-1"></i> Status</button>
                                <button class="btn" onclick="aiEnhanceAll()"><i class="fas fa-magic me-1"></i> Enhance All</button>
                                <button class="btn" onclick="aiSmartFilter()"><i class="fas fa-filter me-1"></i> Smart Filter</button>
                                <button class="btn btn-warning btn-sm" onclick="batchAnalyzeTenders()"><i class="fas fa-bolt me-1"></i> Batch Analyze</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Filters -->
        <div class="row mb-4">
            <div class="col-12">
                <div class="filter-panel">
                    <div class="row g-3 align-items-end">
                        <div class="col-md-2">
                            <label class="form-label">Location</label>
                            <select class="form-select" id="stateFilter">
                                <option value="">All Locations</option>
                                <option value="Bihar">Bihar</option>
                                <option value="Jharkhand">Jharkhand</option>
                            </select>
                        </div>
                        <div class="col-md-2">
                            <label class="form-label">Category</label>
                            <select class="form-select" id="categoryFilter">
                                <option value="">All</option>
                                <option value="works">Works</option>
                                <option value="goods">Goods</option>
                                <option value="services">Services</option>
                            </select>
                        </div>
                        <div class="col-md-2">
                            <label class="form-label">Sort By</label>
                            <select class="form-select" id="sortFilter">
                                <option value="date_desc">Newest First</option>
                                <option value="date_asc">Oldest First</option>
                                <option value="medical">Medical Tenders</option>
                                <option value="value_desc">Highest Value</option>
                                <option value="value_asc">Lowest Value</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Search</label>
                            <input type="text" class="form-control" id="searchFilter" placeholder="Search tenders...">
                        </div>
                        <div class="col-md-2">
                            <button class="btn btn-primary w-100" onclick="applyFilters()"><i class="fas fa-search"></i> Filter</button>
                        </div>
                    </div>
                    <hr>
                    <div class="d-flex gap-2 flex-wrap">
                        <button class="btn btn-primary btn-sm" onclick="manualFetch()"><i class="fas fa-sync-alt me-1"></i> Fetch</button>
                        <button class="btn btn-success btn-sm" onclick="exportToCsv()"><i class="fas fa-file-csv me-1"></i> CSV</button>
                        <button class="btn btn-danger btn-sm" onclick="cleanAllTenders()"><i class="fas fa-broom me-1"></i> Clean All</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Table -->
        <div class="row">
            <div class="col-12">
                <div class="card">
                    <div class="card-header d-flex justify-content-between align-items-center">
                        <span><i class="fas fa-list me-2"></i>Tenders</span>
                        <span class="badge" style="background: var(--primary); color: white;" id="totalRecordsBadge">0</span>
                    </div>
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table mb-0" id="tendersTable">
                                <thead>
                                    <tr>
                                        <th>Title</th>
                                        <th>Organization</th>
                                        <th>Category</th>
                                        <th>State</th>
                                        <th>Published</th>
                                        <th>Status</th>
                                        <th style="width: 100px;">Actions</th>
                                    </tr>
                                </thead>
                                <tbody></tbody>
                            </table>
                        </div>
                        <div class="d-flex justify-content-between align-items-center p-3" style="background: var(--bg-secondary);">
                            <div class="results-info" id="resultsInfo">Loading...</div>
                            <nav id="paginationContainer"></nav>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modals -->
    <div class="modal fade" id="aiAnalysisModal">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header"><h5 class="modal-title"><i class="fas fa-brain me-2" style="color: var(--primary);"></i>AI Analysis</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
                <div class="modal-body" id="aiAnalysisContent"><div class="text-center py-5"><div class="spinner-border"></div></div></div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="emailDraftModal">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header"><h5 class="modal-title"><i class="fas fa-envelope me-2" style="color: var(--success);"></i>Draft Email</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
                <div class="modal-body">
                    <div class="mb-3"><label class="form-label">Supplier Name</label><input type="text" class="form-control" id="supplierNameInput"></div>
                    <div class="mb-3"><label class="form-label">Generated Email</label><textarea class="form-control" id="emailContent" rows="10" style="font-family: 'JetBrains Mono', monospace;"></textarea></div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                    <button type="button" class="btn btn-primary" onclick="copyEmailToClipboard()"><i class="fas fa-copy me-1"></i> Copy</button>
                </div>
            </div>
        </div>
    </div>

    <div class="toast-container position-fixed top-0 end-0 p-3" id="toastContainer" style="z-index: 10000;"></div>
    <div id="loadingSpinner" class="position-fixed top-50 start-50 translate-middle d-none" style="z-index: 10000;">
        <div class="spinner-border text-primary" style="width: 3rem; height: 3rem;"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let currentPage = 1;
        let currentPerPage = 25;
        let currentFilters = {};

        // Load on start
        window.onload = function() {
            loadDashboardStats();
            loadTenders(currentPage, currentPerPage, currentFilters);
        };

        function loadDashboardStats() {
            document.getElementById('totalTendersCount').innerHTML = '<span class="spinner-border spinner-border-sm"></span>';
            document.getElementById('openTendersCount').innerHTML = '<span class="spinner-border spinner-border-sm"></span>';
            document.getElementById('biharTendersCount').innerHTML = '<span class="spinner-border spinner-border-sm"></span>';
            document.getElementById('jharkhandTendersCount').innerHTML = '<span class="spinner-border spinner-border-sm"></span>';
            
            fetch('/metrics')
                .then(r => r.json())
                .then(data => {
                    document.getElementById('totalTendersCount').textContent = data.total_tenders || 0;
                    document.getElementById('openTendersCount').textContent = data.open_tenders || 0;
                    document.getElementById('biharTendersCount').textContent = data.bihar_tenders || 0;
                    document.getElementById('jharkhandTendersCount').textContent = data.jharkhand_tenders || 0;
                })
                .catch(function(e) { console.error('Stats error:', e); });
        }

        function applyFilters() {
            currentFilters = {
                state: document.getElementById('stateFilter').value,
                category: document.getElementById('categoryFilter').value,
                sort: document.getElementById('sortFilter').value,
                search: document.getElementById('searchFilter').value.trim()
            };
            currentPage = 1;
            loadTenders(currentPage, currentPerPage, currentFilters);
        }

        function loadTenders(page, perPage, filters) {
            showLoading();
            var params = 'page=' + page + '&per_page=' + perPage;
            if (filters.state) params += '&state=' + filters.state;
            if (filters.category) params += '&category=' + filters.category;
            if (filters.sort) params += '&sort=' + filters.sort;
            if (filters.search) params += '&search=' + encodeURIComponent(filters.search);
            
            fetch('/api/tenders?' + params)
                .then(function(r) { return r.json(); })
                .then(function(data) {
                    renderTenders(data.tenders);
                    renderPagination(data.current_page, data.pages);
                    updateResultsInfo(data);
                    hideLoading();
                })
                .catch(function(e) { 
                    console.error('Load error:', e); 
                    showToast('Failed to load tenders', 'error'); 
                    hideLoading(); 
                });
        }

        function renderTenders(tenders) {
            var tbody = document.querySelector('#tendersTable tbody');
            if (!tbody) return;
            tbody.innerHTML = '';
            
            if (!tenders || tenders.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" class="empty-state"><i class="fas fa-inbox fa-2x"></i><p>No tenders found</p></td></tr>';
                return;
            }
            
            tenders.forEach(function(t) {
                var state = t.location || '-';
                var stateBadge = state === 'Bihar' ? 'bg-warning' : state === 'Jharkhand' ? 'bg-info' : 'bg-secondary';
                var row = document.createElement('tr');
                row.innerHTML = 
                    '<td class="title-cell"><a href="#">' + (t.title ? t.title.substring(0, 50) + (t.title.length > 50 ? '...' : '') : '') + '</a></td>' +
                    '<td>' + (t.organization || '-') + '</td>' +
                    '<td><span class="badge bg-secondary">' + (t.category || 'General') + '</span></td>' +
                    '<td><span class="badge ' + stateBadge + '">' + state + '</span></td>' +
                    '<td>' + formatDate(t.publish_date) + '</td>' +
                    '<td><span class="badge bg-success">' + (t.status || 'Open') + '</span></td>' +
                    '<td class="action-btns">' +
                        '<button class="btn btn-outline-dark btn-sm me-1 btn-ai-analyze" onclick="aiAnalyzeTender(' + t.id + ')" title="Analyze"><i class="fas fa-brain"></i></button> ' +
                        '<button class="btn btn-outline-dark btn-sm btn-email-draft" onclick="aiDraftEmail(' + t.id + ')" title="Email"><i class="fas fa-envelope"></i></button>' +
                    '</td>';
                tbody.appendChild(row);
            });
        }

        function renderPagination(page, totalPages) {
            var container = document.getElementById('paginationContainer');
            if (!container || totalPages <= 1) { if (container) container.innerHTML = ''; return; }
            
            var html = '<ul class="pagination mb-0">';
            html += '<li class="page-item ' + (page === 1 ? 'disabled' : '') + '"><a class="page-link" href="javascript:loadTenders(' + (page - 1) + ',currentPerPage,currentFilters)">&laquo;</a></li>';
            for (var i = Math.max(1, page - 2); i <= Math.min(totalPages, page + 2); i++) {
                html += '<li class="page-item ' + (i === page ? 'active' : '') + '"><a class="page-link" href="javascript:loadTenders(' + i + ',currentPerPage,currentFilters)">' + i + '</a></li>';
            }
            html += '<li class="page-item ' + (page === totalPages ? 'disabled' : '') + '"><a class="page-link" href="javascript:loadTenders(' + (page + 1) + ',currentPerPage,currentFilters)">&raquo;</a></li></ul>';
            container.innerHTML = html;
        }

        function updateResultsInfo(data) {
            var start = (data.current_page - 1) * data.per_page + 1;
            var end = Math.min(data.current_page * data.per_page, data.total);
            document.getElementById('resultsInfo').textContent = 'Showing ' + start + ' to ' + end + ' of ' + data.total + ' tenders';
            document.getElementById('totalRecordsBadge').textContent = data.total;
        }

        function formatDate(d) { 
            if (!d) return '-';
            var date = new Date(d);
            return date.toLocaleDateString('en-IN');
        }

        function showLoading() { document.getElementById('loadingSpinner').classList.remove('d-none'); }
        function hideLoading() { document.getElementById('loadingSpinner').classList.add('d-none'); }

        function showToast(message, type) {
            var toast = document.createElement('div');
            toast.className = 'toast align-items-center border-0 show';
            var bg = type === 'error' ? 'var(--danger)' : type === 'success' ? 'var(--success)' : 'var(--primary)';
            toast.style.background = bg;
            toast.innerHTML = '<div class="toast-body d-flex align-items-center text-white py-2 px-3"><i class="fas fa-' + (type === 'error' ? 'exclamation-circle' : type === 'success' ? 'check-circle' : 'info-circle') + ' me-2"></i>' + message + '</div>';
            document.getElementById('toastContainer').appendChild(toast);
            setTimeout(function() { toast.remove(); }, 4000);
        }

        // Button Functions
        function checkAIHealth() {
            showToast('Checking AI...', 'info');
            fetch('/ai/health')
                .then(function(r) { return r.json(); })
                .then(function(d) {
                    if (d.status === 'healthy') showToast('AI Online | Model: ' + d.model, 'success');
                    else showToast('AI Error: ' + (d.message || 'Error'), 'error');
                })
                .catch(function(e) { showToast('AI unavailable', 'error'); });
        }

        function aiAnalyzeTender(id) {
            var modal = new bootstrap.Modal(document.getElementById('aiAnalysisModal'));
            modal.show();
            document.getElementById('aiAnalysisContent').innerHTML = '<div class="text-center py-5"><div class="spinner-border text-primary mb-3"></div><p>Analyzing... <span id="analyzeProgress">0%</span></p></div>';
            
            var progress = 0;
            var interval = setInterval(function() {
                progress += 10;
                var p = document.getElementById('analyzeProgress');
                if (p) p.textContent = progress + '%';
                if (progress >= 90) clearInterval(interval);
            }, 200);
            
            fetch('/ai/analyze_tender/' + id)
                .then(function(r) { return r.json(); })
                .then(function(d) {
                    clearInterval(interval);
                    if (d.status === 'success') {
                        var a = d.analysis;
                        document.getElementById('aiAnalysisContent').innerHTML = 
                            '<h6 style="color: var(--primary);">Summary</h6><p>' + (a.summary || '-') + '</p>' +
                            '<h6 style="color: var(--primary);">Sector</h6><p>' + (a.sector || '-') + '</p>' +
                            '<h6 style="color: var(--success);">Medical Fit Score</h6>' +
                            '<div style="font-size:3rem;font-weight:700;font-family: JetBrains Mono;">' + (a.fit_score_for_medical_supplier || 50) + '</div>';
                    } else {
                        document.getElementById('aiAnalysisContent').innerHTML = '<div class="text-danger">Error: ' + d.message + '</div>';
                    }
                });
        }

        function aiDraftEmail(id) {
            var modal = new bootstrap.Modal(document.getElementById('emailDraftModal'));
            modal.show();
            document.getElementById('supplierNameInput').value = '';
            document.getElementById('emailContent').value = 'Generating... <span id="emailProgress">0%</span>';
            
            var progress = 0;
            var interval = setInterval(function() {
                progress += 15;
                var p = document.getElementById('emailProgress');
                if (p) p.textContent = progress + '%';
                if (progress >= 90) clearInterval(interval);
            }, 200);
            
            fetch('/ai/draft_email/' + id, {method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({})})
                .then(function(r) { return r.json(); })
                .then(function(d) { 
                    clearInterval(interval);
                    document.getElementById('emailContent').value = d.status === 'success' ? d.email : 'Error: ' + d.message; 
                });
        }

        function aiEnhanceAll() {
            if (!confirm('Enhance all tenders with AI?')) return;
            showToast('Enhancing all tenders... <span id="enhanceProgress">0%</span>', 'info');
            
            var progress = 0;
            var interval = setInterval(function() {
                progress += 5;
                var toastBody = document.querySelector('.toast:last-child .toast-body');
                if (toastBody) toastBody.innerHTML = 'Enhancing tenders... <span id="enhanceProgress">' + progress + '%</span>';
                if (progress >= 90) clearInterval(interval);
            }, 500);
            
            fetch('/ai/batch_analyze', {method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({all: true})})
                .then(function(r) { return r.json(); })
                .then(function(d) { 
                    clearInterval(interval);
                    showToast('Processed ' + d.count + ' tenders', 'success'); 
                    loadTenders(currentPage, currentPerPage, currentFilters);
                });
        }

        function aiSmartFilter() {
            showToast('AI filtering... <span id="filterProgress">0%</span>', 'info');
            
            var progress = 0;
            var interval = setInterval(function() {
                progress += 10;
                var toastBody = document.querySelector('.toast:last-child .toast-body');
                if (toastBody) toastBody.innerHTML = 'AI filtering... <span id="filterProgress">' + progress + '%</span>';
                if (progress >= 90) clearInterval(interval);
            }, 300);
            
            fetch('/ai/filter_sort_tenders', {method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({preferences: {medical_focus: true}, limit: 25})})
                .then(function(r) { return r.json(); })
                .then(function(d) { 
                    clearInterval(interval);
                    if (d.tenders) {
                        renderTenders(d.tenders.map(function(t) { return t.tender; })); 
                        showToast('Found ' + d.total + ' tenders', 'success');
                    }
                });
        }

        function batchAnalyzeTenders() {
            if (confirm('Analyze all tenders?')) {
                showToast('Analyzing... <span id="batchProgress">0%</span>', 'info');
                
                var progress = 0;
                var interval = setInterval(function() {
                    progress += 5;
                    var toastBody = document.querySelector('.toast:last-child .toast-body');
                    if (toastBody) toastBody.innerHTML = 'Analyzing... <span id="batchProgress">' + progress + '%</span>';
                    if (progress >= 90) clearInterval(interval);
                }, 400);
                
                fetch('/ai/batch_analyze', {method: 'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({all:true})})
                    .then(function(r){return r.json()})
                    .then(function(d){
                        clearInterval(interval);
                        showToast('Analyzed '+d.count+' tenders','success');
                    });
            }
        }

        function copyEmailToClipboard() {
            navigator.clipboard.writeText(document.getElementById('emailContent').value).then(function() { showToast('Copied!', 'success'); });
        }

        function manualFetch() {
            var btns = document.querySelectorAll('.btn-primary.btn-sm');
            btns.forEach(function(b) { b.disabled = true; b.innerHTML = '<span class="spinner-border spinner-border-sm"></span>'; });
            
            showToast('Fetching tenders... <span id="fetchProgress">0%</span>', 'info');
            
            var progress = 0;
            var interval = setInterval(function() {
                progress += 10;
                var toastBody = document.querySelector('.toast:last-child .toast-body');
                if (toastBody) toastBody.innerHTML = 'Fetching tenders... <span id="fetchProgress">' + progress + '%</span>';
                if (progress >= 90) clearInterval(interval);
            }, 500);
            
            fetch('/fetch_manual', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'}
            })
                .then(function(r) { return r.json(); })
                .then(function(d) { 
                    clearInterval(interval);
                    btns.forEach(function(b) { b.disabled = false; b.innerHTML = '<i class="fas fa-sync-alt me-1"></i> Fetch'; });
                    showToast('Fetch started!', 'success'); 
                    setTimeout(function() { 
                        loadDashboardStats();
                    }, 3000); 
                });
        }

        function exportToCsv() { 
            showToast('Exporting... <span id="exportProgress">0%</span>', 'info');
            var progress = 0;
            var interval = setInterval(function() {
                progress += 20;
                var toastBody = document.querySelector('.toast:last-child .toast-body');
                if (toastBody) toastBody.innerHTML = 'Exporting... <span id="exportProgress">' + progress + '%</span>';
                if (progress >= 90) clearInterval(interval);
            }, 300);
            
            window.location.href = '/export_csv'; 
            setTimeout(function() {
                clearInterval(interval);
                showToast('Export complete!', 'success');
            }, 1500);
        }

        function cleanAllTenders() {
            if (!confirm('Remove junk, duplicates & tenders >90 days old?')) return;
            showToast('Cleaning... <span id="cleanProgress">0%</span>', 'info');
            
            var progress = 0;
            var interval = setInterval(function() {
                progress += 15;
                var toastBody = document.querySelector('.toast:last-child .toast-body');
                if (toastBody) toastBody.innerHTML = 'Cleaning... <span id="cleanProgress">' + progress + '%</span>';
                if (progress >= 90) clearInterval(interval);
            }, 200);
            
            fetch('/cleanup_all', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'}
            })
                .then(function(r) { return r.json(); })
                .then(function(d) { 
                    clearInterval(interval);
                    showToast('Cleaned: ' + d.deleted_count + ' removed', 'success');
                    loadDashboardStats();
                    loadTenders(currentPage, currentPerPage, currentFilters);
                })
                .catch(function(e) { 
                    clearInterval(interval);
                    showToast('Cleanup failed', 'error');
                });
        }

        // Auto-refresh stats
        setInterval(loadDashboardStats, 30000);
    </script>
</body>
</html>
